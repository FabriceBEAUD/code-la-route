<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Générateur d'icônes PWA</title>
<style>body{font-family:sans-serif;padding:30px;background:#0f172a;color:#fff;text-align:center}
canvas{display:none} .btn{background:#2563eb;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;margin:8px}
.btn:hover{background:#1d4ed8} h1{margin-bottom:20px} p{margin-bottom:20px;opacity:.7}</style>
</head>
<body>
<h1>🚗 Générateur d'icônes PWA</h1>
<p>Cliquez sur chaque bouton pour télécharger l'icône correspondante dans ce dossier <code>icons/</code></p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<br>
<button class="btn" onclick="download(192)">⬇️ Télécharger icon-192.png</button>
<button class="btn" onclick="download(512)">⬇️ Télécharger icon-512.png</button>
<p style="margin-top:30px;font-size:13px;opacity:.5">Après téléchargement, renommez les fichiers en <code>icon-192.png</code> et <code>icon-512.png</code> et placez-les ici.</p>

<script>
function drawIcon(size) {
  const c = document.getElementById('c' + size);
  const ctx = c.getContext('2d');
  const s = size;
  const fs = s / 192;

  // --- Fond bleu nuit arrondi ---
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#0f172a');
  grad.addColorStop(0.6, '#1e3a5f');
  grad.addColorStop(1, '#1e40af');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.20);
  ctx.fill();

  // --- Route (bande grise en bas) ---
  ctx.fillStyle = '#334155';
  ctx.beginPath();
  ctx.roundRect(0, s * 0.72, s, s * 0.28, { lowerLeft: s * 0.20, lowerRight: s * 0.20 });
  ctx.fill();

  // Ligne pointillée blanche au centre de la route
  ctx.setLineDash([s * 0.06, s * 0.06]);
  ctx.strokeStyle = '#f1f5f9';
  ctx.lineWidth = s * 0.03;
  ctx.beginPath();
  ctx.moveTo(s * 0.15, s * 0.845);
  ctx.lineTo(s * 0.85, s * 0.845);
  ctx.stroke();
  ctx.setLineDash([]);

  // --- Halo lumineux derrière la voiture ---
  const halo = ctx.createRadialGradient(s/2, s*0.48, 0, s/2, s*0.48, s*0.36);
  halo.addColorStop(0, 'rgba(59,130,246,0.45)');
  halo.addColorStop(1, 'rgba(59,130,246,0)');
  ctx.fillStyle = halo;
  ctx.fillRect(0, 0, s, s);

  // --- Voiture (emoji) ---
  ctx.font = `${Math.round(88 * fs)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🚗', s / 2, s * 0.46);

  // --- Texte "CODE" ---
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#ffffff';
  ctx.font = `900 ${Math.round(28 * fs)}px 'Segoe UI', Arial Black, sans-serif`;
  ctx.letterSpacing = `${2 * fs}px`;
  ctx.fillText('CODE', s / 2, s * 0.695);

  // --- Étoile dorée ---
  ctx.font = `${Math.round(16 * fs)}px serif`;
  ctx.fillText('⭐', s / 2 - Math.round(36 * fs), s * 0.695);
  ctx.fillText('⭐', s / 2 + Math.round(36 * fs), s * 0.695);
}

function download(size) {
  drawIcon(size);
  const c = document.getElementById('c' + size);
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
}

drawIcon(192);
drawIcon(512);
</script>
</body>
</html>
